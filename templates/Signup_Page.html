<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="title"><strong>Sign Up!</strong></div>
    <div class="signup-window">
        <form class="input-group" action="" method="POST">
            <input type="text" name="email_address" placeholder="Email-Adresse eingeben..." class="inputField">
            <input type="text" name="username" placeholder="Nutzernamen eingeben..." class="inputField">
            <input type="text" name="password" placeholder="Passwort eingeben..." class="inputField">
            <button type="submit">Signup</button>
        </form>
    </div>
</body>
</html>
